
services:
  # PostgreSQL Database
  postgres:
    container_name: task-manager-db
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-taskdb}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - task-manager-network

  # Backend Service
  backend:
    container_name: task-manager-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: task-manager-backend:latest
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-taskdb}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres123}
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      TASK_MANAGER_CORS_ALLOWED_ORIGINS: ${TASK_MANAGER_CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      TASK_MANAGER_AUTH_USERNAME: ${TASK_MANAGER_AUTH_USERNAME:-admin}
      TASK_MANAGER_AUTH_PASSWORD: ${TASK_MANAGER_AUTH_PASSWORD:-admin123}
      TASK_MANAGER_AUTH_ROLE: ${TASK_MANAGER_AUTH_ROLE:-ROLE_ADMIN}
      JWT_SECRET: ${JWT_SECRET:-ZnVsbFN0YWNrVGFza01hbmFnZXJKV1RTZWNyZXRLZXkyMDI0U2VjdXJl}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - task-manager-network

  # Frontend Service
  frontend:
    container_name: task-manager-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    image: task-manager-frontend:latest
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - task-manager-network

volumes:
  postgres_data:

networks:
  task-manager-network:
    driver: bridge
