spring.application.name=task-manager-backend
server.port=8080

# Database Configuration (PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/taskdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres123}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

# Security Configuration
app.cors.allowed-origins=${TASK_MANAGER_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://task-manager-ashen-nu-54.vercel.app}
app.security.username=${TASK_MANAGER_AUTH_USERNAME:admin}
app.security.password=${TASK_MANAGER_AUTH_PASSWORD:admin123}
app.security.role=${TASK_MANAGER_AUTH_ROLE:ROLE_ADMIN}

# JWT Configuration
# Override JWT_SECRET in production with a long random base64-encoded string
app.jwt.secret=${JWT_SECRET:ZnVsbFN0YWNrVGFza01hbmFnZXJKV1RTZWNyZXRLZXkyMDI0U2VjdXJl}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

