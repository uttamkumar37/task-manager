spring.application.name=task-manager-backend
server.port=8080

spring.datasource.url=jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.security.username=${TASK_MANAGER_AUTH_USERNAME:admin}
app.security.password=${TASK_MANAGER_AUTH_PASSWORD:admin123}
app.security.role=${TASK_MANAGER_AUTH_ROLE:ROLE_ADMIN}

